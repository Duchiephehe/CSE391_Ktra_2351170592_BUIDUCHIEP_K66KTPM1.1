<!doctype html>
<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quản lý sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">Quản lý sản phẩm</a>
        </div>
    </nav>

    <main class="container my-4">
        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap">
            <div class="input-group search-group w-50">
                <input id="searchInput" type="text" class="form-control" placeholder="Tìm kiếm sản phẩm...">
                <button class="btn btn-outline-secondary" type="button">Tìm</button>
            </div>
            <div class="ms-2">
                <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#productModal">Thêm sản
                    phẩm</button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th scope="col">#</th>
                        <th scope="col">Tên sản phẩm</th>
                        <th scope="col">Giá</th>
                        <th scope="col">Số lượng</th>
                        <th scope="col">Mô tả</th>
                        <th scope="col">Hành động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td>Áo thun Basic</td>
                        <td>150.000₫</td>
                        <td>25</td>
                        <td>Áo cotton thoáng mát</td>
                        <td>
                            <button class="btn btn-sm btn-primary me-1">Sửa</button>
                            <button class="btn btn-sm btn-danger">Xóa</button>
                        </td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>Quần Jeans</td>
                        <td>420.000₫</td>
                        <td>12</td>
                        <td>Denim co giãn</td>
                        <td>
                            <button class="btn btn-sm btn-primary me-1">Sửa</button>
                            <button class="btn btn-sm btn-danger">Xóa</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <nav aria-label="Page navigation">
            <ul class="pagination justify-content-center">
                <li class="page-item disabled"><a class="page-link" href="#">Trước</a></li>
                <li class="page-item active"><a class="page-link" href="#">1</a></li>
                <li class="page-item"><a class="page-link" href="#">2</a></li>
                <li class="page-item"><a class="page-link" href="#">Sau</a></li>
            </ul>
        </nav>
    </main>

    <div class="modal fade" id="productModal" tabindex="-1" aria-labelledby="productModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <form class="modal-content" id="productForm">
                <div class="modal-header">
                    <h5 class="modal-title" id="productModalLabel">Thêm / Sửa sản phẩm</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Đóng"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="productName" class="form-label">Tên sản phẩm</label>
                        <input id="productName" type="text" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="productPrice" class="form-label">Giá (VND)</label>
                        <input id="productPrice" type="number" class="form-control" min="0" required>
                    </div>
                    <div class="mb-3">
                        <label for="productQty" class="form-label">Số lượng</label>
                        <input id="productQty" type="number" class="form-control" min="0" required>
                    </div>
                    <div class="mb-3">
                        <label for="productDesc" class="form-label">Mô tả</label>
                        <textarea id="productDesc" class="form-control" rows="2"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="submit" class="btn btn-primary">Lưu</button>
                </div>
            </form>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('productForm').addEventListener('submit', function (e) {
            e.preventDefault();
            var modalEl = document.getElementById('productModal');
            var modal = bootstrap.Modal.getOrCreateInstance(modalEl);
            modal.hide();
            // Thông báo tạm thời (UI tĩnh)
            alert('Form gửi (demo tĩnh): thay đổi chưa được lưu).');
        });
    </script>
</body>

</html>
